<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="200" height="50" rx="6" fill="url(#gradient)"/>
  
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="199" height="49" rx="5.5" stroke="rgba(0,0,0,0.1)"/>
  
  <!-- Logo/Icon -->
  <g>
    <!-- Outer circle with glow -->
    <circle cx="25" cy="25" r="16" fill="url(#iconGradient)"/>
    <circle cx="25" cy="25" r="15" fill="#10B981"/>
    <!-- Checkmark -->
    <path d="M18 25L22 29L32 19" 
          stroke="white" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Text Group -->
  <g>
    <!-- "Featured on" text -->
    <text x="50" y="22" 
          font-family="Inter, system-ui, -apple-system" 
          font-size="11" 
          letter-spacing="0.3px"
          fill="#6B7280">
      FEATURED ON
    </text>
    
    <!-- "AI Agents Directory" text -->
    <text x="50" y="38" 
          font-family="Inter, system-ui, -apple-system" 
          font-size="14" 
          font-weight="600" 
          letter-spacing="0.2px"
          fill="#111827">
      AI Agents Directory
    </text>
  </g>

  <!-- Definitions -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="gradient" x1="0" y1="0" x2="200" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>
    
    <!-- Icon gradient -->
    <linearGradient id="iconGradient" x1="25" y1="9" x2="25" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-1" y="0" width="202" height="52" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.05"/>
    </filter>
  </defs>
</svg> 